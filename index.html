<!DOCTYPE html>
<html>

<head>
<title>Vehicle Tracker</title>
<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{
  text-align:center;
  font-family:Arial;
}
#map{
  height:500px;
  width:90%;
  margin:auto;
}
</style>
</head>

<body>

<h1>Vehicle Tracking System</h1>

<input type="text"
id="vehicleNo"
placeholder="Enter Vehicle Number">

<button onclick="loadLocation()">
Track
</button>

<h3 id="coords"></h3>
<h3 id="speed"></h3>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Mobile GPS location server ki send cheyyadam
function sendMyLocation(){
 navigator.geolocation.watchPosition(function(pos){
  const vno = "YOUR_VEHICLE_NUMBER"; // mee vehicle number ikkade petti
  fetch("https://gps-tracking-website-production.up.railway.app/location?vno=" + document.getElementById("vehicleNo").value)
});
}
sendMyLocation();
</script>

<script src="script.js"></script>

</body>
</html>
